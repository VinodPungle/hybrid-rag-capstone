services:
  api:
    build: .
    container_name: hybrid-rag-api
    ports:
      - "8000:8000"
    env_file:
      - .env
    volumes:
      - ./data:/app/data
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/health')"]
      interval: 30s
      timeout: 10s
      retries: 3

  ui:
    build: .
    container_name: hybrid-rag-ui
    command: streamlit run ui/app.py --server.port=8501 --server.address=0.0.0.0
    ports:
      - "8501:8501"
    env_file:
      - .env
    volumes:
      - ./data:/app/data
    depends_on:
      api:
        condition: service_healthy

  prometheus:
    image: prom/prometheus:latest
    container_name: hybrid-rag-prometheus
    ports:
      - "9090:9090"
    volumes:
      - ./monitoring/prometheus.yml:/etc/prometheus/prometheus.yml
    depends_on:
      api:
        condition: service_healthy
    profiles:
      - monitoring

  grafana:
    image: grafana/grafana:latest
    container_name: hybrid-rag-grafana
    ports:
      - "3000:3000"
    environment:
      - GF_SECURITY_ADMIN_PASSWORD=admin
    volumes:
      - grafana-data:/var/lib/grafana
      - ./monitoring/grafana/provisioning:/etc/grafana/provisioning
    depends_on:
      - prometheus
    profiles:
      - monitoring

  airflow:
    image: apache/airflow:2.10.4-python3.13
    container_name: hybrid-rag-airflow
    environment:
      - AIRFLOW__CORE__EXECUTOR=LocalExecutor
      - AIRFLOW__CORE__LOAD_EXAMPLES=False
      - AIRFLOW__DATABASE__SQL_ALCHEMY_CONN=sqlite:////opt/airflow/airflow.db
    env_file:
      - .env
    volumes:
      - ./airflow/dags:/opt/airflow/dags
      - ./:/opt/airflow/project
      - airflow-data:/opt/airflow
    ports:
      - "8080:8080"
    command: >
      bash -c "
        pip install -r /opt/airflow/project/requirements.txt --quiet &&
        airflow db migrate &&
        airflow users create --username admin --password admin --firstname Admin --lastname User --role Admin --email admin@example.com || true &&
        airflow webserver --port 8080 &
        airflow scheduler
      "
    profiles:
      - airflow

  tests:
    build: .
    container_name: hybrid-rag-tests
    command: python -m pytest tests/ -v -m "not integration"
    env_file:
      - .env
    profiles:
      - test

volumes:
  grafana-data:
  airflow-data:
